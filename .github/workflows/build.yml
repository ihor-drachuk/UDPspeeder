name: build

on:
  workflow_call:
    inputs:
      upload-artifacts:
        description: "Upload built binaries as workflow artifacts"
        required: false
        default: true
        type: boolean

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: linux-amd64,   runs-on: ubuntu-latest, apt: g++ }
          - { target: linux-arm64,   runs-on: ubuntu-latest, apt: g++-aarch64-linux-gnu }
          - { target: linux-armhf,   runs-on: ubuntu-latest, apt: g++-arm-linux-gnueabihf }
          - { target: windows-i686,  runs-on: ubuntu-latest, apt: g++-mingw-w64-i686 }
          - { target: macos-amd64,   runs-on: macos-latest }
          - { target: macos-arm64,   runs-on: macos-latest }
    steps:
      - uses: actions/checkout@v6

      - name: Install toolchain
        if: matrix.apt
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ${{ matrix.apt }}

      - name: Build
        run: bash scripts/ci-build.sh ${{ matrix.target }}

      - name: Upload artifact
        if: ${{ inputs.upload-artifacts }}
        uses: actions/upload-artifact@v7
        with:
          name: speederv2-${{ matrix.target }}
          path: |
            speederv2-${{ matrix.target }}
            speederv2-${{ matrix.target }}.exe
          if-no-files-found: error
          retention-days: 14
